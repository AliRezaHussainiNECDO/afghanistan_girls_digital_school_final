name: Flutter iOS Build

# این بخش مشخص می‌کند که با هر بار Push کردن کد روی شاخه اصلی (main)، بیلد شروع شود
on:
  push:
    branches: [ "master" ] # اگر نام شاخه اصلی شما master است، آن را به master تغییر دهید
  workflow_dispatch: # این گزینه به شما اجازه می‌دهد بیلد را به صورت دستی هم اجرا کنید

jobs:
  build:
    # استفاده از سرورهای مک گیت‌هاب که به صورت رایگان در اختیار شماست
    runs-on: macos-latest

    steps:
      # ۱. دانلود کدهای پروژه شما روی سرور
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۲. نصب محیط جاوا (برای پیش‌نیازهای عمومی)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ۳. نصب و تنظیم فلاتر روی سرور مک
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # یا نسخه دقیق فلاتر خودتان مثل 3.22.0
          channel: 'stable'
          cache: true

      # ۳.۵. غیرفعال‌کردن Swift Package Manager فلاتر — بعضی پکیج‌ها (مثل
      # image_picker) از طریق SPM وابستگی‌هایی می‌آورند که برای بیلد روی
      # دستگاه واقعی (نه شبیه‌ساز) نیاز به تیم توسعه‌دهنده دارند، حتی با
      # --no-codesign. با غیرفعال‌کردن SPM، همه‌چیز از طریق CocoaPods می‌آید
      # که می‌توانیم امضایش را کامل خاموش کنیم.
      - name: Disable Swift Package Manager (force CocoaPods only)
        run: flutter config --no-enable-swift-package-manager

      # ۴. دریافت پکیج‌های پروژه
      - name: Install dependencies
        run: flutter pub get

      # ۴.۵. به‌روزرسانی مخزن CocoaPods (رفع خطای specs out-of-date)
      - name: Update CocoaPods repo
        run: pod repo update

      # ۴.۷. اجرای صریح pod install — این کار باعث می‌شود Pods.xcodeproj همین
      # الان (نه فقط پنهانی داخل flutter build ios) ساخته شود، تا اسکریپت
      # غیرفعال‌کردن امضا بتواند هم روی Runner.xcodeproj و هم روی
      # Pods.xcodeproj (پکیج‌هایی مثل jitsi_meet_flutter_sdk و
      # apivideo_live_stream) اعمال شود.
      - name: Run pod install
        working-directory: ios
        run: pod install

      # ۴.۷۵. غیرفعال‌کردن کامل امضای کد در فایل پروژه Xcode (project.pbxproj)
      # چون فقط تنظیم CODE_SIGNING_ALLOWED=NO در Release.xcconfig کافی نیست —
      # Xcode مقدار ProvisioningStyle=Automatic را مستقیماً از project.pbxproj
      # می‌خواند و پیش از رسیدن به xcconfig، خطای «Development Team لازم است»
      # می‌دهد. اسکریپت جداگانه (ios/ci_disable_signing.rb) را اجرا می‌کنیم تا
      # از پیچیدگی/شکنندگی نقل‌قول تودرتوی چندخطی داخل YAML جلوگیری شود.
      - name: Force-disable code signing in project.pbxproj
        run: ruby ios/ci_disable_signing.rb

      # ۵. ساخت نسخه iOS بدون نیاز به گواهی امضا (Code Signing)
      # دستور --no-codesign باعث می‌شود گیت‌هاب بدون خطای اپل ایدی پروژه را کامپایل کند
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # ۶. تبدیل خروجی به فایل .ipa قابل نصب
      # از آنجا که بدون ساین بیلد گرفتیم، پوشه خروجی را برای راحتی کار زیپ یا آماده می‌کنیم
      - name: Prepare Payload for IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r GitHub_Build.ipa Payload

      # ۷. آپلود فایل نهایی در گیت‌هاب برای دانلود شما
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: GitHub_Build.ipa
