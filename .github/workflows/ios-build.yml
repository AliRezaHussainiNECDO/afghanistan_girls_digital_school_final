name: Flutter iOS Build

# این بخش مشخص می‌کند که با هر بار Push کردن کد روی شاخه اصلی (master)، بیلد شروع شود
on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # این گزینه به شما اجازه می‌دهد بیلد را به صورت دستی هم اجرا کنید

jobs:
  build:
    # استفاده از سرورهای مک گیت‌هاب
    runs-on: macos-latest

    steps:
      # ۱. دانلود کدهای پروژه شما روی سرور
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۲. نصب محیط جاوا (برای پیش‌نیازهای عمومی)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ۳. نصب و تنظیم فلاتر روی سرور مک
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ۴. دریافت پکیج‌های پروژه فلاتر
      - name: Install dependencies
        run: flutter pub get

      # ۵. به‌روزرسانی دیتابیس CocoaPods (رفع خطای اصلی)
      - name: Update CocoaPods Repo
        run: |
          pod repo update

      # ۶. ساخت نسخه iOS با غیرفعال کردن Swift Package Manager جهت سازگاری با پکیج‌های قدیمی
      - name: Build iOS
        run: |
          flutter config --no-enable-swift-package-manager
          flutter build ios --release --no-codesign

      # ۷. تبدیل خروجی به فایل .ipa قابل نصب
      - name: Prepare Payload for IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r GitHub_Build.ipa Payload

      # ۸. آپلود فایل نهایی در گیت‌هاب برای دانلود شما
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: GitHub_Build.ipa