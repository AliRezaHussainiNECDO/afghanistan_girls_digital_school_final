name: Flutter iOS Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ۱. دانلود کدهای پروژه شما
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۲. نصب محیط جاوا
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ۳. نصب و تنظیم فلاتر روی سرور مک
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: false

      # ۴. دریافت پکیج‌های پروژه فلاتر
      - name: Install dependencies
        run: flutter pub get

      # ۵. ساخت فایل Podfile و تنظیم نسخه iOS به صورت خودکار
      - name: Generate and configure Podfile
        run: |
          cd ios
          # اگر فایل Podfile وجود نداشت، یک ساختار اولیه برای آن ایجاد کن
          if [ ! -f Podfile ]; then
            echo "platform :ios, '14.0'" > Podfile
            echo "use_frameworks!" >> Podfile
            echo "target 'Runner' do" >> Podfile
            echo "  use_frameworks!" >> Podfile
            echo "end" >> Podfile
          else
            # اگر وجود داشت، خط مربوط به پلتفرم را اصلاح کن
            sed -i '' "s/# platform :ios, '9.0'/platform :ios, '14.0'/g" Podfile
            sed -i '' "s/platform :ios, '9.0'/platform :ios, '14.0'/g" Podfile
          fi
          pod repo update

      # ۶. ساخت نسخه iOS بدون SPM و بدون ساین
      - name: Build iOS
        run: |
          flutter config --no-enable-swift-package-manager
          flutter build ios --release --no-codesign

      # ۷. تبدیل خروجی به فایل .ipa قابل نصب
      - name: Prepare Payload for IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r GitHub_Build.ipa Payload

      # ۸. آپلود فایل نهایی
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ipa
          path: GitHub_Build.ipa