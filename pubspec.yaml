name: afghanistan_girls_digital_school
description: "Afghanistan Girls Digital School — Flutter client (Phase 1: UI Prototype with mock data)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  google_fonts: ^8.1.0
  image_picker: ^1.1.2
  flutter_animate: ^4.5.2
  # رندر متن Markdown درس‌های تولید هوشمند (Pure AI) — راست‌به‌چپ کامل در
  # student lesson view (lesson_detail_screen.dart).
  flutter_markdown: ^0.7.4+3
  confetti: ^0.8.0
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^33.2.15
  record: ^7.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  dio: ^5.7.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  # حذف شد: apivideo_live_stream — مسیر «پخش مستقیم از اپ» با این پکیج روی
  # برخی گوشی‌ها (خصوصاً سامسونگ) در لحظهٔ اتصال RTMPS یک Crash بومی
  # (SIGSEGV در libssl) ایجاد می‌کرد که به‌گفتهٔ خودِ سازندهٔ پکیج در سطح
  # کتابخانه رفع‌شدنی نیست؛ برای رفعِ ریشه‌ای این وابستگی کامل حذف شد
  # (رجوع کنید به seminars/presentation/widgets/go_live_flow.dart).
  # ویدیوکنفرانس واقعی چندنفره برای سمینار (هم میزبان/استاد و هم شاگرد/والد
  # از همین مسیرِ پایدار استفاده می‌کنند) — فقط اندروید/iOS.
  jitsi_meet_flutter_sdk: 12.1.3
  # Push Notification واقعی روی گوشی (حتی وقتی اپ بسته است) — Firebase Cloud
  # Messaging. اختیاری و کاملاً Fail-safe: تا وقتی پروژهٔ Firebase وصل نشده
  # (google-services.json/GoogleService-Info.plist)، core/push/push_notifications_service.dart
  # هر خطا را بی‌صدا می‌بلعد و بقیهٔ اپ عادی کار می‌کند.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  # جایگزین تایپ‌دار dart:html (منسوخ‌شده) برای انتخاب/دانلود فایل در وب —
  # pdf_picker_web.dart و pdf_saver_web.dart. قبلاً فقط به‌صورت transitive
  # (از طریق بسته‌های دیگر) در دسترس بود؛ حالا صریح اعلام شده.
  web: ^1.1.0
  # کد QR روی سرتیفیکت — لینک به صفحهٔ تأیید عمومی آنلاین اصالت سند (بدون
  # نیاز به ورود)، برای اعتبار بین‌المللی گواهی‌نامه‌ها (مثل Coursera/edX).
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/logo/

  # ── فونت محلی (حالت کاملاً آفلاین) ──
  # اول download_fonts.ps1 را اجرا کنید تا فایل‌ها در assets/fonts دانلود
  # شوند، بعد این بخش را از کامنت خارج کنید تا فونت بدون انترنت هم کار کند:
  # fonts:
  #   - family: Vazirmatn
  #     fonts:
  #       - asset: assets/fonts/Vazirmatn-Regular.ttf
  #       - asset: assets/fonts/Vazirmatn-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Vazirmatn-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Vazirmatn-Bold.ttf
  #         weight: 700
