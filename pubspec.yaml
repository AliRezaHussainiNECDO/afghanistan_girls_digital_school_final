name: afghanistan_girls_digital_school
description: "Afghanistan Girls Digital School — Flutter client (Phase 1: UI Prototype with mock data)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  google_fonts: ^8.1.0
  image_picker: ^1.1.2
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^33.2.15
  record: ^7.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  dio: ^5.7.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  apivideo_live_stream: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/logo/

  # ── فونت محلی (حالت کاملاً آفلاین) ──
