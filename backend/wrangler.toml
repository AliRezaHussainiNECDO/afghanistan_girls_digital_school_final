# پیکربندی Cloudflare Worker — بک‌اند «مکتب دیجیتال دختران افغانستان».
# طبق درخواست کاربر: چت واقعی بین کاربران، پیام صوتی، و ذخیرهٔ کتاب‌های
# پی‌دی‌اف نصاب تعلیمی نیاز به یک بک‌اند واقعی دارد (نه فقط داده‌های محلی).
#
# بعد از ساخت D1 و R2 (طبق backend/README.md)، مقادیر زیر را با شناسه‌های
# واقعی خودتان جایگزین کنید.

name = "afghan-girls-school-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# دامنهٔ شما — بعداً می‌توانید روی afghanistangirlsdigitalschool.org هم Route بسازید.
# routes = [{ pattern = "api.afghanistangirlsdigitalschool.org/*", zone_name = "afghanistangirlsdigitalschool.org" }]

[[d1_databases]]
binding = "DB"
database_name = "afghan_girls_school_db"
database_id = "76b6e211-eecd-4464-ae0f-8fb65a21eebe"

# R2 — فضای ذخیرهٔ فایل‌های صوتی چت و PDF کتابخانه.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "afghan-girls-school-storage"

[vars]
ALLOWED_ORIGIN = "*"
# ── پخش زندهٔ سمینار با Cloudflare Stream ──────────────────────────────────
# ۱) در داشبورد Cloudflare، بخش Stream را فعال کنید (پلن پخش زنده).
# ۲) شناسهٔ حساب و زیردامنهٔ مشتری استریم را اینجا بگذارید:
# CF_ACCOUNT_ID = شناسهٔ حساب (Account ID)
# CF_STREAM_CUSTOMER = کد مشتری در نشانی customer-XXXX.cloudflarestream.com
# ۳) توکن API با دسترسی «Stream:Edit» را به‌صورت راز (secret) بگذارید:
# wrangler secret put CF_STREAM_TOKEN
# اگر این‌ها تنظیم نشوند، مسیر go-live با ۵۰۳ پاسخ می‌دهد و اپ به «لینک
# جلسهٔ دستی» (meetingLink) یا اتاق داخلی برمی‌گردد؛ پس اپ همیشه کار می‌کند.
CF_ACCOUNT_ID = "3276f5f2f9915da134fc398e98b6539d"
CF_STREAM_CUSTOMER = "3xsnqty4gq6f5bah"
# معلم هوشمند (LLM) — کلید را با `wrangler secret put AI_PROVIDER_KEY` بگذارید.
# URL و مدل را می‌توانید برای هر ارائه‌دهندهٔ سازگار با OpenAI تغییر دهید.
AI_PROVIDER_URL = "https://api.openai.com/v1/chat/completions"
AI_MODEL = "gpt-4o-mini"
# صدای معلم AI (TTS/STT) — منبع: Azure Cognitive Services "school-speech-service-ai"
# (Resource Group: afghan-school-group, Region: East US).
# نکته: Azure هیچ صدای TTS برای دری (fa-AF) یا پشتو (ps-AF) ندارد — پس نامی مثل
# «Fatima/prs-AF-FatimaNeural» روی Azure اصلاً وجود ندارد و هر درخواستی با آن رد
# می‌شود (جزئیات در بالای routes/ai.ts). نزدیک‌ترین صدای خانمِ واقعی و کارکردنی:
# فارسی ایران fa-IR-DilaraNeural — همین‌جا به‌عنوان صدای پیش‌فرض تنظیم شده.
AZURE_TTS_REGION = "eastus"
AZURE_TTS_VOICE = "fa-IR-DilaraNeural"
# کلید (حساس/محرمانه) را با دستور زیر — نه در این فایل — تنظیم کنید:
#   wrangler secret put AZURE_TTS_KEY       (Key 1 یا Key 2 از Azure Portal را وقتی
#                                            خواسته شد paste کنید)
# • در نبود Azure، از همان AI_PROVIDER_KEY برای TTS/Whisper استفاده می‌شود.

# کار خانگی + نمره‌دهی هوشمند (Vision) — routes/homework.ts:
# • OCR/نمره‌دهی عکس دست‌خط: Gemini 1.5 Flash (رایگان/ارزان و از تصویر پشتیبانی می‌کند).
#   کلید را با دستور زیر بگذارید (از https://aistudio.google.com/apikey بگیرید):
#   wrangler secret put GEMINI_API_KEY
# GEMINI_VISION_MODEL = "gemini-3.5-flash"   (پیش‌فرض همین است؛ نیازی به تنظیم دستی نیست —
#   نکته: gemini-1.5-flash قبلاً پیش‌فرض بود اما گوگل آن را کاملاً خاموش کرده)
# • در نبود این کلید، عکس شاگرد ذخیره می‌شود اما نمره‌دهی خودکار غیرفعال
#   می‌ماند (۵۰۳ فقط برای همان بخش؛ آپلود هرگز شکست نمی‌خورد).
# • گفت‌وگوی پیگیری دربارهٔ نمره از همان AI_PROVIDER_KEY بالا استفاده می‌کند.

# ── Push Notification واقعی روی گوشی (حتی وقتی اپ بسته است) — lib/push.ts ───
# فرق با نوتیفیکیشن فعلی: نوتیفیکیشن فعلی فقط «داخل‌اپی» است (زنگ 🔔، باید اپ
# را باز کنید)؛ این‌جا Push واقعی روی سیستم‌عامل گوشی است، از طریق Firebase
# Cloud Messaging (FCM) — رایگان.
# ۱) در https://console.firebase.google.com یک پروژهٔ تازه بسازید (رایگان).
# ۲) اپ اندروید/iOS را به آن پروژه اضافه کنید (فایل‌های google-services.json /
#    GoogleService-Info.plist را می‌گیرید — اینها را باید خودتان در پوشهٔ
#    android/app و ios/Runner اپ فلاتر قرار دهید، نه اینجا).
# ۳) Project Settings → Service Accounts → «Generate new private key» → یک
#    فایل JSON دانلود می‌شود؛ سه مقدار زیر از همان فایل می‌آیند:
FCM_PROJECT_ID = "af-digital-girls-school"   # فیلد project_id پروژهٔ جدید Firebase (غیرمحرمانه)
# کلیدهای محرمانه را با دستورهای زیر (نه در این فایل) تنظیم کنید:
#   wrangler secret put FCM_CLIENT_EMAIL     (فیلد client_email از همان فایل)
#   wrangler secret put FCM_PRIVATE_KEY      (فیلد private_key از همان فایل — کامل، با \n ها)
# • در نبود این سه مقدار، اعلان‌ها فقط داخل‌اپی (زنگ 🔔) باقی می‌مانند — هیچ
#   Endpointی کرش/کند نمی‌شود.
